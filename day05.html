<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY05</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: black;
        }
        .container{

            width: 80%;
            margin: 40px auto;
            background-color: brown;
            /* height: 100vh; */
            color: rgb(230, 230, 230);
        }
        article{
            padding: 10px 60px;
        }

        .title{
            margin-top: 30px;
            text-shadow: 1px 1px 3px gray;
        }
        .desc{
           text-align: justify;
           margin: 20px 0;
           font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }

        .desc::first-letter{
            font-size: 25px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <article>
            <h1 class="title">Does BMC IT CLUB workshops are really effective?</h1>
            <p class="desc">No, It's worst.</p>
        </article>
    </div>
</body>
</html>
